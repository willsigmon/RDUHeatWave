<style>
/* Timer-specific overrides (shared.css provides the rest) */
:root {
  --color-border: rgba(232, 88, 12, 0.22);
  --gradient-fire: linear-gradient(135deg, #E8580C 0%, #FF6A1E 55%, #FF9B40 100%);
  --shadow-glow: 0 0 80px rgba(232, 88, 12, 0.15), 0 0 160px rgba(232, 88, 12, 0.08);
  --shadow-lg: 0 16px 36px rgba(0, 0, 0, 0.45);
  --radius-lg: 0.9rem;
  --radius-xl: 1.25rem;
}

body {
  min-height: 100dvh;
  font-family: var(--font-body);
  color: var(--color-text);
  background:
    radial-gradient(circle at 50% 20%, rgba(232, 88, 12, 0.16), transparent 24rem),
    linear-gradient(180deg, #1a1412 0%, #120d0b 100%);
  display: grid;
  place-items: center;
  overflow: hidden;
  position: relative;
}

.heat-bg,
.embers,
.heat-orb {
  position: fixed;
  inset: 0;
  pointer-events: none;
}

.heat-line {
  position: absolute;
  left: -50%;
  width: 200%;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(232, 88, 12, 0.05) 25%, rgba(232, 88, 12, 0.12) 50%, rgba(232, 88, 12, 0.05) 75%, transparent 100%);
  animation: heat-drift linear infinite;
}
.heat-line:nth-child(1) { top: 18%; animation-duration: 14s; }
.heat-line:nth-child(2) { top: 34%; animation-duration: 18s; animation-delay: -4s; }
.heat-line:nth-child(3) { top: 56%; animation-duration: 16s; animation-delay: -9s; }
.heat-line:nth-child(4) { top: 76%; animation-duration: 20s; animation-delay: -6s; }

.heat-orb::before {
  content: "";
  position: absolute;
  width: 32rem;
  height: 32rem;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: radial-gradient(circle, rgba(232, 88, 12, 0.22) 0%, rgba(232, 88, 12, 0.08) 35%, transparent 68%);
  filter: blur(8px);
}

.ember {
  position: absolute;
  bottom: -1rem;
  width: 0.4rem;
  height: 0.4rem;
  border-radius: 50%;
  background: rgba(255, 160, 96, 0.85);
  box-shadow: 0 0 14px rgba(232, 88, 12, 0.45);
  animation: ember-rise linear infinite;
}

.shell {
  position: relative;
  z-index: 1;
  width: min(92vw, 56rem);
  padding: 2rem;
}

.panel {
  position: relative;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-xl);
  background: linear-gradient(180deg, rgba(44, 36, 32, 0.96) 0%, rgba(35, 28, 24, 0.96) 100%);
  box-shadow: var(--shadow-lg), var(--shadow-glow);
  padding: clamp(1.75rem, 4vw, 3rem);
  overflow: hidden;
}

.panel::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.03), transparent 35%);
  pointer-events: none;
}

.eyebrow {
  font-family: var(--font-display);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--color-primary);
  font-size: clamp(1rem, 1.5vw, 1.2rem);
  margin-bottom: 0.75rem;
}

h1 {
  font-family: var(--font-display);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  line-height: 0.95;
  font-size: clamp(3rem, 10vw, 6rem);
  margin-bottom: 0.75rem;
}

.subhead {
  color: var(--color-text-muted);
  font-size: clamp(1rem, 2vw, 1.15rem);
  max-width: 38rem;
}

.timer-wrap {
  display: grid;
  gap: 1.25rem;
  justify-items: center;
  margin: clamp(2rem, 6vw, 3.5rem) 0 1rem;
}

.timer-label {
  font-family: var(--font-display);
  color: var(--color-text-faint);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-size: clamp(1rem, 2vw, 1.35rem);
}

.timer-value {
  font-family: var(--font-display);
  font-size: clamp(8rem, 24vw, 15rem);
  letter-spacing: 0.08em;
  line-height: 0.88;
  background: linear-gradient(180deg, #ffffff 0%, #f5dccc 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.45));
}

.timer-status {
  min-height: 1.5rem;
  color: var(--color-text-muted);
  font-size: 0.95rem;
  letter-spacing: 0.02em;
}

.timer-status.done {
  color: var(--color-success);
}

.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 0.85rem;
  justify-content: center;
  margin-top: 1.25rem;
}

.btn {
  appearance: none;
  border: 1px solid transparent;
  border-radius: 999px;
  cursor: pointer;
  padding: 0.9rem 1.3rem;
  font: inherit;
  font-weight: 700;
  transition: transform 0.15s ease, border-color 0.15s ease, background-color 0.15s ease, box-shadow 0.15s ease;
}

.btn:hover { transform: translateY(-1px); }
.btn:active { transform: translateY(0); }

.btn-primary {
  background: var(--gradient-fire);
  color: #fff;
  box-shadow: 0 10px 22px rgba(232, 88, 12, 0.28);
}

.btn-secondary {
  background: rgba(255, 255, 255, 0.02);
  border-color: var(--color-border);
  color: var(--color-text);
}

.hint {
  margin-top: 1.4rem;
  text-align: center;
  color: var(--color-text-faint);
  font-size: 0.88rem;
}

@keyframes heat-drift {
  from { transform: translateX(0); }
  to { transform: translateX(16%); }
}

@keyframes ember-rise {
  0% { transform: translate3d(0, 0, 0) scale(0.8); opacity: 0; }
  12% { opacity: 1; }
  100% { transform: translate3d(var(--drift, 0px), -110vh, 0) scale(1.3); opacity: 0; }
}

@media (max-width: 640px) {
  .shell { padding: 1rem; }
  .panel { padding: 1.5rem 1.15rem 1.75rem; }
  .controls { gap: 0.65rem; }
  .btn { width: 100%; }
}

</style>
</head>
<body>
<noscript><div class="noscript-banner">JavaScript is required to use this page.</div></noscript>
<div class="heat-bg" aria-hidden="true">
  <div class="heat-line"></div>
  <div class="heat-line"></div>
  <div class="heat-line"></div>
  <div class="heat-line"></div>
</div>
<div class="heat-orb" aria-hidden="true"></div>
<div class="embers" id="embers" aria-hidden="true"></div>

<main class="shell">
  <section class="panel gradient-border">
    <div class="eyebrow">RDU Heatwave</div>
    <h1 class="heat-text"><img src="/icons/iconscout/timer.svg" alt="" class="page-icon" width="32" height="32">30-Second Timer</h1>
    <p class="subhead">Built for quick intros, referral rounds, and anything else that needs a clean half-minute clock.</p>

    <div class="timer-wrap">
      <div class="timer-label">Time Remaining</div>
      <div class="timer-value thermal-scan" id="timer">00:30</div>
      <div class="timer-status" id="timer-status">Running</div>
    </div>

    <div class="controls">
      <button class="btn btn-primary fire-btn" id="toggle-btn" type="button">Pause<div class="ember-wrap" aria-hidden="true"><div class="ember"></div><div class="ember"></div><div class="ember"></div><div class="ember"></div><div class="ember"></div><div class="ember"></div></div></button>
      <button class="btn btn-secondary fire-btn" id="reset-btn" type="button">Restart 30s<div class="ember-wrap" aria-hidden="true"><div class="ember"></div><div class="ember"></div><div class="ember"></div><div class="ember"></div><div class="ember"></div><div class="ember"></div></div></button>
    </div>

    <p class="hint">Tip: add <strong>?seconds=45</strong> if you ever want a different starting value without making another page.</p>
  </section>
</main>

<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var requestedSeconds = parseInt(params.get('seconds'), 10);
  var defaultSeconds = Number.isFinite(requestedSeconds) && requestedSeconds > 0 && requestedSeconds <= 3600
    ? requestedSeconds
    : 30;

  var timerEl = document.getElementById('timer');
  var statusEl = document.getElementById('timer-status');
  var toggleBtn = document.getElementById('toggle-btn');
  var resetBtn = document.getElementById('reset-btn');

  var remainingSeconds = defaultSeconds;
  var endTime = Date.now() + (remainingSeconds * 1000);
  var intervalId = null;
  var running = true;

  function formatTime(totalSeconds) {
    var minutes = Math.floor(totalSeconds / 60);
    var seconds = totalSeconds % 60;
    return String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
  }

  function render() {
    timerEl.textContent = formatTime(remainingSeconds);
    document.title = formatTime(remainingSeconds) + ' — RDU Heatwave Timer';
  }

  function updateStatus() {
    if (remainingSeconds === 0) {
      statusEl.textContent = 'Time!';
      statusEl.classList.add('done');
      toggleBtn.textContent = 'Start';
      return;
    }

    statusEl.classList.remove('done');
    statusEl.textContent = running ? 'Running' : 'Paused';
    toggleBtn.textContent = running ? 'Pause' : 'Start';
  }

  function stopInterval() {
    if (!intervalId) return;
    window.clearInterval(intervalId);
    intervalId = null;
  }

  function tick() {
    var diffMs = endTime - Date.now();
    remainingSeconds = Math.max(0, Math.ceil(diffMs / 1000));
    render();

    if (remainingSeconds === 0) {
      running = false;
      stopInterval();
      updateStatus();
    }
  }

  function startTimer() {
    if (remainingSeconds === 0) {
      remainingSeconds = defaultSeconds;
    }

    running = true;
    endTime = Date.now() + (remainingSeconds * 1000);
    stopInterval();
    intervalId = window.setInterval(tick, 100);
    tick();
    updateStatus();
  }

  function pauseTimer() {
    running = false;
    stopInterval();
    updateStatus();
  }

  toggleBtn.addEventListener('click', function() {
    if (running) pauseTimer();
    else startTimer();
  });

  resetBtn.addEventListener('click', function() {
    remainingSeconds = defaultSeconds;
    render();
    startTimer();
  });

  var MAX_EMBERS = 30;
  var embersContainer = document.getElementById('embers');
  var emberCount = Math.min(18, MAX_EMBERS);
  for (var i = 0; i < emberCount; i += 1) {
    if (embersContainer.childElementCount >= MAX_EMBERS) break;
    var ember = document.createElement('span');
    ember.className = 'ember';
    ember.style.left = (Math.random() * 100).toFixed(2) + '%';
    ember.style.animationDuration = (8 + Math.random() * 8).toFixed(2) + 's';
    ember.style.animationDelay = (-Math.random() * 8).toFixed(2) + 's';
    ember.style.opacity = (0.25 + Math.random() * 0.55).toFixed(2);
    ember.style.setProperty('--drift', ((Math.random() * 120) - 60).toFixed(0) + 'px');
    embersContainer.appendChild(ember);
  }

  render();
  updateStatus();
  startTimer();
})();
</script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(function(){});</script>
