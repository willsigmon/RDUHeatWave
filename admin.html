<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#E8580C">
<meta name="robots" content="noindex, nofollow">
<title>RDU Heatwave — Admin Report</title>
<meta name="description" content="Admin report dashboard for RDU Heatwave team leaders.">
<link rel="canonical" href="https://rduheatwave.team/admin">
<meta property="og:type" content="website">
<meta property="og:title" content="RDU Heatwave — Admin Report">
<meta property="og:description" content="Admin report dashboard for RDU Heatwave team leaders.">
<meta property="og:url" content="https://rduheatwave.team/admin">
<meta property="og:image" content="https://rduheatwave.team/icons/heatwave-icon-512.png">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="RDU Heatwave — Admin Report">
<meta name="twitter:description" content="Admin report dashboard for RDU Heatwave team leaders.">
<meta name="twitter:image" content="https://rduheatwave.team/icons/heatwave-icon-512.png">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" href="/icons/heatwave-icon-192.png">
<link rel="apple-touch-icon" href="/icons/heatwave-icon-180.png">
<link rel="manifest" href="/site.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<style>
  /* Admin uses shorthand aliases for convenience */
  :root {
    --fire: var(--color-primary);
    --fire-hover: var(--color-primary-hover);
    --bg: var(--color-bg);
    --surface: var(--color-surface);
    --surface-2: var(--color-surface-2);
    --text: var(--color-text);
    --text-muted: var(--color-text-muted);
    --text-faint: var(--color-text-faint);
    --success: var(--color-success);
    --danger: var(--color-error);
    --border: var(--color-divider);
    --radius: 20px;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(circle at top, rgba(232,88,12,0.14), transparent 36%),
      linear-gradient(180deg, #181210 0%, var(--bg) 100%);
    color: var(--text);
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  }

  .page {
    width: min(1200px, calc(100vw - 32px));
    margin: 0 auto;
    padding: 32px 0 48px;
  }

  .hero {
    display: flex;
    justify-content: space-between;
    gap: 20px;
    align-items: end;
    margin-bottom: 24px;
  }

  .eyebrow,
  .section-label {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.14em;
    color: var(--fire);
  }

  .eyebrow { font-size: 1rem; margin-bottom: 8px; }

  h1, h2 {
    margin: 0;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.06em;
  }

  h1 { font-size: clamp(2.4rem, 6vw, 4.2rem); line-height: 0.95; }
  h2 { font-size: 1.7rem; margin-bottom: 14px; }

  .hero p,
  .card-subtext,
  .muted,
  td,
  th,
  label,
  input,
  button {
    font-size: 0.97rem;
    line-height: 1.5;
  }

  .muted { color: var(--text-muted); }

  .panel,
  .card,
  .table-wrap,
  .login-card {
    background: rgba(35, 28, 24, 0.92);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 14px 40px rgba(0,0,0,0.26);
  }

  .login-shell {
    min-height: calc(100vh - 80px);
    display: grid;
    place-items: center;
  }

  .login-card {
    width: min(480px, calc(100vw - 32px));
    padding: 28px;
  }

  .login-card p { color: var(--text-muted); margin: 10px 0 20px; }

  .login-form {
    display: grid;
    gap: 14px;
  }

  .field {
    display: grid;
    gap: 8px;
  }

  input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.08);
    background: var(--surface-2);
    color: var(--text);
    font-family: inherit;
  }

  input:focus {
    outline: none;
    border-color: rgba(232,88,12,0.6);
    box-shadow: 0 0 0 3px rgba(232,88,12,0.15);
  }

  button {
    border: 0;
    border-radius: 14px;
    padding: 14px 18px;
    background: linear-gradient(180deg, var(--fire-hover), var(--fire));
    color: #fff;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
  }

  button.secondary {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text);
  }

  .view-toggle.is-active {
    background: rgba(232,88,12,0.18);
    border-color: rgba(232,88,12,0.32);
    color: #fff;
  }

  .error { color: #ffb8b8; min-height: 1.5em; }

  .report-shell { display: none; }
  .report-shell.visible { display: block; }

  .actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .kpi-grid,
  .two-col {
    display: grid;
    gap: 16px;
  }

  .kpi-grid {
    grid-template-columns: repeat(4, minmax(0, 1fr));
    margin-bottom: 16px;
  }

  .two-col {
    grid-template-columns: 1.2fr 0.8fr;
    margin-bottom: 16px;
  }

  .card {
    padding: 18px;
  }

  .kpi-label,
  .mini-label {
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-faint);
    font-size: 0.78rem;
    font-weight: 700;
  }

  .kpi-value {
    margin-top: 10px;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.05em;
    font-size: clamp(2rem, 4vw, 3rem);
    line-height: 1;
  }

  .snapshot-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    margin-top: 16px;
  }

  .snapshot-item {
    padding: 12px;
    border-radius: 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
  }

  .snapshot-value {
    margin-top: 6px;
    font-size: 1.35rem;
    font-weight: 800;
  }

  .table-wrap {
    padding: 12px;
    overflow: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th,
  td {
    text-align: left;
    padding: 12px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    white-space: nowrap;
  }

  th {
    color: var(--text-faint);
    text-transform: uppercase;
    font-size: 0.76rem;
    letter-spacing: 0.08em;
  }

  tr:last-child td { border-bottom: 0; }

  .list {
    display: grid;
    gap: 10px;
  }

  .list-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
  }

  .rank {
    display: inline-grid;
    place-items: center;
    width: 28px;
    height: 28px;
    border-radius: 999px;
    background: rgba(232,88,12,0.18);
    color: var(--fire-hover);
    font-weight: 800;
    flex-shrink: 0;
  }

  .list-main {
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .list-text strong {
    display: block;
    font-size: 0.95rem;
  }

  .list-text span {
    color: var(--text-muted);
    font-size: 0.82rem;
  }

  .list-value {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.05em;
    font-size: 1.6rem;
    line-height: 1;
  }

  .empty {
    color: var(--text-faint);
    padding: 12px 0 4px;
  }

  .footer-note {
    margin-top: 16px;
    color: var(--text-faint);
    font-size: 0.82rem;
  }

  .loading {
    color: var(--text-muted);
    padding: 24px 0;
  }

  .report-view { display: none; }
  .report-view.active { display: block; }

  .presenter-view {
    display: grid;
    gap: 16px;
  }

  .teleprompter-card {
    padding: 22px;
    background: linear-gradient(180deg, rgba(35, 28, 24, 0.98), rgba(27, 21, 18, 0.98));
    border: 1px solid rgba(232,88,12,0.18);
    border-radius: 24px;
    box-shadow: 0 18px 48px rgba(0,0,0,0.28);
  }

  .teleprompter-card p {
    margin: 12px 0 0;
    color: var(--text-muted);
    max-width: 70ch;
  }

  .presenter-stat-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    margin-top: 16px;
  }

  .presenter-stat {
    padding: 14px;
    border-radius: 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
  }

  .presenter-stat-value {
    margin-top: 8px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 4vw, 3rem);
    letter-spacing: 0.05em;
    line-height: 1;
  }

  .teleprompter-lines {
    display: grid;
    gap: 14px;
  }

  .teleprompter-line {
    padding: 18px 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    font-size: clamp(1.15rem, 2vw, 1.55rem);
    line-height: 1.55;
    color: var(--text);
  }

  /* === Sparkline bars in trend table === */
  .bar-cell {
    position: relative;
    overflow: hidden;
  }

  .bar-cell::before {
    content: '';
    position: absolute;
    inset: 0 0 0 0;
    background: rgba(232, 88, 12, 0.15);
    width: var(--bar-pct, 0%);
    border-radius: 4px;
    pointer-events: none;
  }

  .bar-cell span {
    position: relative;
    z-index: 1;
  }

  /* === Delta badges === */
  .delta {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 0.72rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 999px;
    margin-top: 4px;
    letter-spacing: 0.03em;
  }

  .delta-up {
    background: rgba(91, 168, 71, 0.18);
    color: #6ecf52;
  }

  .delta-down {
    background: rgba(217, 68, 68, 0.18);
    color: #e87070;
  }

  .snapshot-item {
    /* already defined above; extend with flex direction for delta */
    display: flex;
    flex-direction: column;
  }

  /* === SVG Sparkline row === */
  .sparkline-row {
    display: flex;
    gap: 24px;
    align-items: flex-end;
    justify-content: flex-start;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }

  .sparkline-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .sparkline-item-label {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-faint);
  }

  svg.sparkline {
    display: block;
    vertical-align: middle;
    overflow: visible;
  }

  /* === Last-refreshed indicator === */
  .refresh-indicator {
    margin-top: 6px;
    font-size: 0.78rem;
    color: var(--text-faint);
    transition: color 0.3s;
  }

  .refresh-indicator.stale {
    color: var(--fire);
  }

  /* === Print styles === */
  @media print {
    .login-shell { display: none !important; }
    .actions { display: none !important; }

    body {
      background: #fff !important;
      color: #111 !important;
    }

    .page { padding: 16px 0; }

    .panel,
    .card,
    .table-wrap,
    .snapshot-item,
    .list-item,
    .teleprompter-card,
    .presenter-stat {
      background: #f7f7f7 !important;
      border-color: #ccc !important;
      box-shadow: none !important;
      color: #111 !important;
    }

    .eyebrow,
    .section-label,
    .kpi-label,
    .mini-label { color: #E8580C !important; }

    .muted,
    .kpi-value,
    .snapshot-value,
    .list-value,
    .presenter-stat-value,
    th, td { color: #111 !important; }

    .report-shell { display: block !important; }
    .report-view { display: block !important; }
    .presenter-view { display: none !important; }
  }

  @media (max-width: 960px) {
    .kpi-grid,
    .snapshot-grid,
    .two-col,
    .presenter-stat-grid {
      grid-template-columns: 1fr 1fr;
    }
  }

  @media (max-width: 680px) {
    .hero,
    .actions,
    .kpi-grid,
    .snapshot-grid,
    .two-col,
    .presenter-stat-grid {
      grid-template-columns: 1fr;
      display: grid;
      justify-content: stretch;
    }

    .actions { margin-top: 12px; }
  }
</style>
</head>
<body>
<div class="heat-bg" aria-hidden="true"><div class="heat-line"></div><div class="heat-line"></div><div class="heat-line"></div><div class="heat-line"></div><div class="heat-line"></div></div>
<noscript><div class="noscript-banner">JavaScript is required to use this page.</div></noscript>

<div class="login-shell" id="login-shell">
  <div class="login-card gradient-border">
    <div class="eyebrow">RDU Heatwave</div>
    <h1 class="heat-text"><img src="/icons/iconscout/admin-shield.svg" alt="" class="page-icon">Admin Report</h1>
    <p>Quick weekly readout for guests, BizChats, referrals, revenue, and attendance flags.</p>
    <form class="login-form" id="login-form">
      <div class="field">
        <label for="passcode">Passcode</label>
        <input id="passcode" name="passcode" type="password" inputmode="numeric" autocomplete="current-password" placeholder="Enter passcode">
      </div>
      <button type="submit" id="unlock-btn" class="fire-btn">Unlock Admin Report<div class="ember-wrap" aria-hidden="true"><div class="ember"></div><div class="ember"></div><div class="ember"></div><div class="ember"></div><div class="ember"></div><div class="ember"></div></div></button>
      <div class="error" id="login-error"></div>
    </form>
  </div>
</div>

<div class="report-shell" id="report-shell">
  <div class="page">
    <div class="hero">
      <div>
        <div class="eyebrow">RDU Heatwave</div>
        <h1 class="heat-text"><img src="/icons/iconscout/admin-shield.svg" alt="" class="page-icon">Admin Report</h1>
        <p class="muted">Built to replace spreadsheet-tab scavenger hunts with one clean weekly dashboard.</p>
        <div class="refresh-indicator" id="refresh-indicator"></div>
      </div>
      <div class="actions">
        <button class="secondary view-toggle is-active" type="button" data-view="dashboard">Dashboard</button>
        <button class="secondary view-toggle" type="button" data-view="presenter">Presenter</button>
        <button class="secondary" type="button" id="fullscreen-btn">Fullscreen</button>
        <button class="secondary" type="button" id="print-btn">Print</button>
        <button class="secondary" type="button" id="refresh-btn">Refresh</button>
        <button class="secondary" type="button" id="lock-btn">Lock</button>
      </div>
    </div>

    <div id="report-content" class="loading">Loading report…</div>
  </div>
</div>

<script>
(function() {
  var STORAGE_KEY = 'rdu-admin-passcode';
  var loginShell = document.getElementById('login-shell');
  var reportShell = document.getElementById('report-shell');
  var loginForm = document.getElementById('login-form');
  var passcodeInput = document.getElementById('passcode');
  var loginError = document.getElementById('login-error');
  var reportContent = document.getElementById('report-content');
  var refreshBtn = document.getElementById('refresh-btn');
  var printBtn = document.getElementById('print-btn');
  var lockBtn = document.getElementById('lock-btn');
  var fullscreenBtn = document.getElementById('fullscreen-btn');
  var refreshIndicator = document.getElementById('refresh-indicator');
  var viewButtons = Array.prototype.slice.call(document.querySelectorAll('.view-toggle'));
  var currentView = sessionStorage.getItem('rdu-admin-view') || 'dashboard';
  var lastRefreshedAt = null;
  var refreshIndicatorTimer = null;

  function escapeHtml(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function setLockedState(isLocked) {
    loginShell.style.display = isLocked ? 'grid' : 'none';
    reportShell.classList.toggle('visible', !isLocked);
  }

  function renderList(items, formatter) {
    if (!items || !items.length) {
      return '<div class="empty">Nothing to show right now.</div>';
    }

    return '<div class="list">' + items.map(formatter).join('') + '</div>';
  }

  function parseNumeric(val) {
    if (val === null || val === undefined) return 0;
    return parseFloat(String(val).replace(/[^0-9.\-]/g, '')) || 0;
  }

  function barCell(value, maxValue) {
    var pct = maxValue > 0 ? Math.round((parseNumeric(value) / maxValue) * 100) : 0;
    pct = Math.min(100, Math.max(0, pct));
    return '<td class="bar-cell" style="--bar-pct:' + pct + '%"><span>' + escapeHtml(value) + '</span></td>';
  }

  function renderSparkline(values, color) {
    if (!values || values.length < 2) return '';
    var w = 80, h = 24, pad = 2;
    var max = Math.max.apply(null, values) || 1;
    var min = Math.min.apply(null, values);
    var range = max - min || 1;
    var points = values.map(function(v, i) {
      var x = pad + (i / (values.length - 1)) * (w - pad * 2);
      var y = h - pad - ((v - min) / range) * (h - pad * 2);
      return x.toFixed(1) + ',' + y.toFixed(1);
    }).join(' ');
    var lastPoint = points.split(' ').pop();
    var lastX = lastPoint.split(',')[0];
    var lastY = lastPoint.split(',')[1];
    return '<svg width="' + w + '" height="' + h + '" class="sparkline">' +
      '<polyline points="' + points + '" fill="none" stroke="' + (color || 'rgba(232,88,12,0.7)') + '" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>' +
      '<circle cx="' + lastX + '" cy="' + lastY + '" r="2" fill="' + (color || '#E8580C') + '"/>' +
    '</svg>';
  }

  function renderTable(rows) {
    if (!rows || !rows.length) {
      return '<div class="empty">No weekly data available yet.</div>';
    }

    var maxGuests = Math.max.apply(null, rows.map(function(r) { return parseNumeric(r.guests); }));
    var maxBizChats = Math.max.apply(null, rows.map(function(r) { return parseNumeric(r.bizChats); }));
    var maxReferrals = Math.max.apply(null, rows.map(function(r) { return parseNumeric(r.referrals); }));
    var maxRevenue = Math.max.apply(null, rows.map(function(r) { return parseNumeric(r.revenue); }));

    return '<div class="table-wrap"><table><thead><tr>' +
      '<th>Week</th><th>Guests</th><th>BizChats</th><th>Referrals</th><th>Revenue</th>' +
      '</tr></thead><tbody>' +
      rows.map(function(row) {
        return '<tr>' +
          '<td>' + escapeHtml(row.week) + '</td>' +
          barCell(row.guests, maxGuests) +
          barCell(row.bizChats, maxBizChats) +
          barCell(row.referrals, maxReferrals) +
          barCell(row.revenue, maxRevenue) +
        '</tr>';
      }).join('') +
      '</tbody></table></div>';
  }

  function renderDelta(current, previous) {
    var curr = parseNumeric(current);
    var prev = parseNumeric(previous);
    if (!prev || isNaN(curr) || isNaN(prev)) return '';
    var pct = Math.round(((curr - prev) / Math.abs(prev)) * 100);
    if (pct === 0) return '';
    var up = pct > 0;
    return '<span class="delta ' + (up ? 'delta-up' : 'delta-down') + '">' +
      (up ? '↑' : '↓') + ' ' + Math.abs(pct) + '%' +
    '</span>';
  }

  function renderPresenterStatGrid(items) {
    return '<div class="presenter-stat-grid">' + items.map(function(item) {
      return '<div class="presenter-stat">' +
        '<div class="mini-label">' + escapeHtml(item.label) + '</div>' +
        '<div class="presenter-stat-value">' + escapeHtml(item.value) + '</div>' +
      '</div>';
    }).join('') + '</div>';
  }

  function setView(view) {
    currentView = view === 'presenter' ? 'presenter' : 'dashboard';
    sessionStorage.setItem('rdu-admin-view', currentView);

    Array.prototype.forEach.call(document.querySelectorAll('.report-view'), function(node) {
      node.classList.toggle('active', node.getAttribute('data-view') === currentView);
    });

    viewButtons.forEach(function(button) {
      button.classList.toggle('is-active', button.getAttribute('data-view') === currentView);
    });
  }

  function renderReport(report) {
    reportContent.className = '';
    reportContent.innerHTML =
      '<div class="report-view" data-view="dashboard">' +
        '<div class="kpi-grid">' +
          '<div class="card"><div class="kpi-label">Guests Hosted</div><div class="kpi-value">' + escapeHtml(report.kpis.guestsHosted) + '</div></div>' +
          '<div class="card"><div class="kpi-label">BizChats</div><div class="kpi-value">' + escapeHtml(report.kpis.bizChats) + '</div></div>' +
          '<div class="card"><div class="kpi-label">Referrals</div><div class="kpi-value">' + escapeHtml(report.kpis.referrals) + '</div></div>' +
          '<div class="card"><div class="kpi-label">Closed Revenue</div><div class="kpi-value">' + escapeHtml(report.kpis.closedRevenue) + '</div></div>' +
        '</div>' +

        '<div class="card" style="margin-bottom:16px;">' +
          '<div class="section-label">Latest completed week</div>' +
          '<h2>' + escapeHtml(report.currentWeek.label) + '</h2>' +
          (function() {
            var cur = report.recentWeeks && report.recentWeeks[0];
            var prev = report.recentWeeks && report.recentWeeks[1];
            var curGuests = cur ? cur.guests : report.currentWeek.guests;
            var curBizChats = cur ? cur.bizChats : report.currentWeek.bizChats;
            var curReferrals = cur ? cur.referrals : report.currentWeek.referrals;
            var curRevenue = cur ? cur.revenue : report.currentWeek.closedRevenue;
            return '<div class="snapshot-grid">' +
              '<div class="snapshot-item"><div class="mini-label">Guests</div><div class="snapshot-value">' + escapeHtml(report.currentWeek.guests) + '</div>' + (prev ? renderDelta(curGuests, prev.guests) : '') + '</div>' +
              '<div class="snapshot-item"><div class="mini-label">BizChats</div><div class="snapshot-value">' + escapeHtml(report.currentWeek.bizChats) + '</div>' + (prev ? renderDelta(curBizChats, prev.bizChats) : '') + '</div>' +
              '<div class="snapshot-item"><div class="mini-label">Referrals</div><div class="snapshot-value">' + escapeHtml(report.currentWeek.referrals) + '</div>' + (prev ? renderDelta(curReferrals, prev.referrals) : '') + '</div>' +
              '<div class="snapshot-item"><div class="mini-label">Closed Revenue</div><div class="snapshot-value">' + escapeHtml(report.currentWeek.closedRevenue) + '</div>' + (prev ? renderDelta(curRevenue, prev.revenue) : '') + '</div>' +
            '</div>';
          })() +
        '</div>' +

        '<div class="card" style="margin-bottom:16px;">' +
          '<div class="section-label">Recent weeks</div>' +
          '<h2>Trend line</h2>' +
          (function() {
            var weeks = report.recentWeeks;
            if (weeks && weeks.length >= 2) {
              var ordered = weeks.slice().reverse();
              var guests   = ordered.map(function(r) { return parseNumeric(r.guests); });
              var bizChats = ordered.map(function(r) { return parseNumeric(r.bizChats); });
              var refs     = ordered.map(function(r) { return parseNumeric(r.referrals); });
              var rev      = ordered.map(function(r) { return parseNumeric(r.revenue); });
              return '<div class="sparkline-row">' +
                '<div class="sparkline-item">' + renderSparkline(guests,   'rgba(232,88,12,0.8)')  + '<span class="sparkline-item-label">Guests</span></div>' +
                '<div class="sparkline-item">' + renderSparkline(bizChats, 'rgba(107,204,244,0.8)') + '<span class="sparkline-item-label">BizChats</span></div>' +
                '<div class="sparkline-item">' + renderSparkline(refs,     'rgba(91,168,71,0.8)')   + '<span class="sparkline-item-label">Referrals</span></div>' +
                '<div class="sparkline-item">' + renderSparkline(rev,      'rgba(255,215,0,0.8)')   + '<span class="sparkline-item-label">Revenue</span></div>' +
              '</div>';
            }
            return '';
          })() +
          renderTable(report.recentWeeks) +
        '</div>' +

        '<div class="two-col">' +
          '<div class="card">' +
            '<div class="section-label">Leaderboard</div>' +
            '<h2>Top guest hosts</h2>' +
            renderList(report.leaders.guestHosts, function(item, index) {
              return '<div class="list-item">' +
                '<div class="list-main"><div class="rank">' + (index + 1) + '</div><div class="list-text"><strong>' + escapeHtml(item.name) + '</strong><span>Guest points / hosted guests</span></div></div>' +
                '<div class="list-value">' + escapeHtml(item.value) + '</div>' +
              '</div>';
            }) +
          '</div>' +

          '<div class="card">' +
            '<div class="section-label">Leaderboard</div>' +
            '<h2>Top BizChat activity</h2>' +
            renderList(report.leaders.bizChats, function(item, index) {
              return '<div class="list-item">' +
                '<div class="list-main"><div class="rank">' + (index + 1) + '</div><div class="list-text"><strong>' + escapeHtml(item.name) + '</strong><span>Total BizChats logged</span></div></div>' +
                '<div class="list-value">' + escapeHtml(item.value) + '</div>' +
              '</div>';
            }) +
          '</div>' +
        '</div>' +

        '<div class="two-col" style="margin-top:16px;">' +
          '<div class="card">' +
            '<div class="section-label">Attendance</div>' +
            '<h2>Watchlist</h2>' +
            renderList(report.attendanceWatchlist, function(item) {
              return '<div class="list-item">' +
                '<div class="list-text"><strong>' + escapeHtml(item.name) + '</strong><span>' +
                'Unexcused: ' + escapeHtml(item.unexcused) + ' • Excused: ' + escapeHtml(item.excused) + ' • Subs: ' + escapeHtml(item.sub) +
                '</span></div>' +
                '<div class="list-value">' + escapeHtml(item.totalFlags) + '</div>' +
              '</div>';
            }) +
          '</div>' +

          '<div class="card">' +
            '<div class="section-label">Revenue</div>' +
            '<h2>Recent closed business</h2>' +
            renderList(report.recentClosedDeals, function(item) {
              return '<div class="list-item">' +
                '<div class="list-text"><strong>' + escapeHtml(item.prospect || 'Closed deal') + '</strong><span>' +
                escapeHtml(item.dateLabel) + ' • ' + escapeHtml(item.from) + ' → ' + escapeHtml(item.to) +
                '</span></div>' +
                '<div class="list-value">' + escapeHtml(item.revenue) + '</div>' +
              '</div>';
            }) +
          '</div>' +
        '</div>' +

        '<div class="footer-note">Generated from the live published reports and referral pipeline. Good for quick reads; still not a replacement for deep spreadsheet surgery.</div>' +
      '</div>' +

      '<div class="report-view presenter-view" data-view="presenter">' +
        '<div class="teleprompter-card">' +
          '<div class="section-label">Presenter mode</div>' +
          '<h2>Read this like a team-selling report</h2>' +
          '<p>' + escapeHtml(report.presenter.guidance) + '</p>' +
        '</div>' +

        '<div class="teleprompter-card">' +
          '<div class="section-label">Last week</div>' +
          '<h2>' + escapeHtml(report.currentWeek.label) + '</h2>' +
          renderPresenterStatGrid(report.presenter.lastWeekStats) +
        '</div>' +

        '<div class="teleprompter-card">' +
          '<div class="section-label">Rolling 12 months</div>' +
          '<h2>Big picture</h2>' +
          renderPresenterStatGrid(report.presenter.rollingStats) +
        '</div>' +

        '<div class="teleprompter-card">' +
          '<div class="section-label">Teleprompter</div>' +
          '<h2>Readout copy</h2>' +
          '<div class="teleprompter-lines">' +
            report.presenter.scriptLines.map(function(line) {
              return '<div class="teleprompter-line">' + escapeHtml(line) + '</div>';
            }).join('') +
          '</div>' +
        '</div>' +
      '</div>';

    setView(currentView);
    startRefreshIndicator();
  }

  async function loadReport(passcode) {
    reportContent.className = 'loading';
    reportContent.textContent = 'Loading report…';
    loginError.textContent = '';

    var response = await fetch('/api/admin-report', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Admin-Passcode': passcode
      },
      body: JSON.stringify({ passcode: passcode })
    });

    var payload = await response.json().catch(function() {
      return null;
    });

    if (!response.ok || !payload || payload.status !== 'ok') {
      throw new Error((payload && payload.message) || 'Could not unlock admin report');
    }

    sessionStorage.setItem(STORAGE_KEY, passcode);
    setLockedState(false);
    renderReport(payload.report);
  }

  loginForm.addEventListener('submit', async function(event) {
    event.preventDefault();
    var passcode = passcodeInput.value.trim();
    if (!passcode) {
      loginError.textContent = 'Enter the passcode first.';
      return;
    }

    try {
      await loadReport(passcode);
    } catch (error) {
      loginError.textContent = error.message || 'Could not unlock admin report.';
    }
  });

  refreshBtn.addEventListener('click', function() {
    var passcode = sessionStorage.getItem(STORAGE_KEY) || '';
    if (!passcode) {
      setLockedState(true);
      return;
    }

    loadReport(passcode).catch(function(error) {
      reportContent.className = 'error';
      reportContent.textContent = error.message || 'Could not refresh admin report.';
    });
  });

  lockBtn.addEventListener('click', function() {
    sessionStorage.removeItem(STORAGE_KEY);
    sessionStorage.removeItem('rdu-admin-view');
    passcodeInput.value = '';
    reportContent.innerHTML = '';
    if (refreshIndicatorTimer) { clearInterval(refreshIndicatorTimer); refreshIndicatorTimer = null; }
    lastRefreshedAt = null;
    refreshIndicator.textContent = '';
    setLockedState(true);
  });

  viewButtons.forEach(function(button) {
    button.addEventListener('click', function() {
      setView(button.getAttribute('data-view'));
    });
  });

  fullscreenBtn.addEventListener('click', function() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(function() {});
      return;
    }

    document.exitFullscreen().catch(function() {});
  });

  printBtn.addEventListener('click', function() {
    window.print();
  });

  function updateRefreshIndicator() {
    if (!lastRefreshedAt) {
      refreshIndicator.textContent = '';
      return;
    }

    var elapsed = Math.floor((Date.now() - lastRefreshedAt) / 1000);
    var mins = Math.floor(elapsed / 60);
    var label = mins === 0
      ? 'Last refreshed: just now'
      : 'Last refreshed: ' + mins + ' min ago';

    refreshIndicator.textContent = label;
    refreshIndicator.classList.toggle('stale', mins >= 10);
  }

  function startRefreshIndicator() {
    lastRefreshedAt = Date.now();
    updateRefreshIndicator();

    if (refreshIndicatorTimer) clearInterval(refreshIndicatorTimer);
    refreshIndicatorTimer = setInterval(updateRefreshIndicator, 60000);
  }

  var savedPasscode = sessionStorage.getItem(STORAGE_KEY);
  if (savedPasscode) {
    setLockedState(false);
    loadReport(savedPasscode).catch(function() {
      sessionStorage.removeItem(STORAGE_KEY);
      setLockedState(true);
    });
  } else {
    setLockedState(true);
  }
})();
</script>
</body>
</html>
